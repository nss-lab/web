# Research areas — shown on the homepage cards and the /research/ page.
# Three pillars (AI, Security, System). Edit a summary or reorder freely.
- title: AI
  summary: >-
    Securing modern AI, and using AI for security. We probe and harden large
    language models — jailbreaking text-to-image models (PC²), poisoning and
    safely fine-tuning Mixture-of-Experts LLMs (MoEvil, SafeMoE), unlearning
    unsafe alignment, and removing backdoors from parameter-efficient fine-tuning
    (Obliviate) — and we build ML/NLP methods for security, from dark-web language
    models (DarkBERT) to graph- and federated-learning-based threat detection.
- title: Security
  summary: >-
    Understanding and defending networked systems. We study network, web, and
    blockchain security, cyber threat intelligence, and large-scale measurement —
    security provenance for intrusion analysis (SECTRACER), SDN/SD-WAN attacks and
    defenses (Ambusher, Heimdallr), micro-architectural and timing side channels
    (AVXProbe), traffic obfuscation and anonymity (MUFLLER, EqualNet), and
    permissionless blockchain security (Partitioning Ethereum).
- title: System
  summary: >-
    High-performance systems that are secure by construction. We accelerate and
    protect cloud infrastructure — service-mesh ingress on SmartNICs (HybridMesh,
    HardMesh), serverless/FaaS with trusted execution (AccelFaaS, TDSnap,
    Cryonics), RDMA-aware and isolated container networking (RDNet, Hyperion),
    and in-network security via SDN/NFV and reconfigurable hardware (Reinhardt).
